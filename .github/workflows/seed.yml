name: Seed DB

# Carga el contenido de prisma/content/ a la base de producción.
# Corre solo cuando un push a main toca contenido, o a mano desde la
# pestaña Actions (workflow_dispatch). Los seeds son upserts idempotentes:
# repetirlos no destruye progreso de usuarios (ver DEPLOYMENT.md).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "prisma/content/**"
      - "prisma/seed.ts"
      - "prisma/seed-content.ts"
      - "prisma/seed-practice.ts"

# Nunca dos seeds a la vez; el que llega espera al que corre.
concurrency:
  group: seed-db
  cancel-in-progress: false

jobs:
  seed:
    name: seed contenido → producción
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      # seed.ts sale con exit 0 si no hay DATABASE_URL (para no romper CIs
      # sin DB). Aquí eso sería un falso verde: fallamos explícitamente.
      - name: Verificar secret DATABASE_URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Falta el secret DATABASE_URL. Configúralo en Settings → Secrets and variables → Actions con la connection string de Supabase (la misma de .env.local)."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Seed
        run: npx tsx prisma/seed.ts
